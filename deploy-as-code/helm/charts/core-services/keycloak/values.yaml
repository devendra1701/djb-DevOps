# Common Labels
labels:
  app: "keycloak"
  group: "core"

namespace: egov

# Ingress Configs
ingress:
  enabled: true
  zuul: false
  context: "keycloak"

# Container Configs
image:
  repository: "delhijalboard/keycloak"
  tag: "v2"
replicas: "1"

# Additional Container Envs
env: |  
  - name: SERVER_PORT
    value: "8080"
  - name: PROXY_ADDRESS_FORWARDING
    value: "true"
  - name: KC_DB
    value: postgres
  - name: DB_ADDR
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-host
  - name: DB_DATABASE
    valueFrom: 
      configMapKeyRef:
        name: egov-config
        key: auth-db-name
  - name: DB_PORT
    value: "5432"
  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: db
        key: username
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password
  - name: KC_DB_URL
    value: "jdbc:postgresql://68.233.117.247:5432/authdb"      
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_PROXY
    value: "edge"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HTTP_RELATIVE_PATH
    value: "/keycloak"
  - name: KC_HOSTNAME_URL
    value: "https://dev-djb.nitcon.in/keycloak"
  - name: KC_HOSTNAME_PATH
    value: "/keycloak"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: "admin"
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    value: "admin"

  - name: QUARKUS_DATASOURCE_USER_STORE_DB_KIND
    value: postgresql

  - name: QUARKUS_DATASOURCE_USER_STORE_JDBC_URL
    value: "jdbc:postgresql://68.233.117.247:5432/djbdev"

  - name: QUARKUS_DATASOURCE_USER_STORE_USERNAME
    valueFrom:
      secretKeyRef:
        name: db
        key: username

  - name: QUARKUS_DATASOURCE_USER_STORE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password

  - name: QUARKUS_DATASOURCE_USER_STORE_JDBC_TRANSACTIONS
    value: enabled
  - name: EGOV_ENC_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-enc-service

  - name: EGOV_ENCSERVICE_BASE_URL
    value: http://egov-enc-service.egov:8080/egov-enc-service

  - name: QUARKUS_DATASOURCE_USER_STORE_JDBC_TRANSACTIONS
    value: enabled

