apiVersion: batch/v1
kind: Job
metadata:
  name: superset-init
  namespace: egov
spec:
  template:
    spec:
      containers:
        - name: superset-init
          image: docker.io/delhijalboard/apache-superset:v4
          command: ["/bin/sh", "-c"]
          args:
            - |
              superset db upgrade && \
              superset init && \
              superset fab create-admin \
                --username admin \
                --firstname Admin \
                --lastname User \
                --email admin@superset.com \
                --password Admin@123
          envFrom:
            - secretRef:
                name: db
            - configMapRef:
                name: egov-config
          env:
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset
                  key: superset-secret-key
            - name: REDIS_HOST
              value: "redis.backbone" # <-- your redis service
            - name: REDIS_PORT
              value: "6379"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db
                  key: password
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: egov-config
                  key: db-host
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
      restartPolicy: Never
      volumes:
        - name: superset-config
          configMap:
            name: superset-config
  backoffLimit: 3
