# Common Labels
labels:
  app: "egov-otp"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "otp"

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "egov_otp_schema"
    image:
      repository: "egov-otp-db"

# Container Configs
image:
  repository: "egov-otp"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/otp/health"
  readinessProbePath: "/otp/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx384m -Xms256m"

# Additional Container Envs
env: |
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-host

  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: egov-config
        key: db-name

  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: db
        key: username

  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db
        key: password

  - name: DB_PORT
    value: "5432"
 
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: SECURITY_BASIC_ENABLED
    value: "false"  
  - name: MANAGEMENT_SECURITY_ENABLED
    value: "false"
